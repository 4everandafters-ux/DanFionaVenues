  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ransform: uppercase; color:#8a7c5c; margin-top: 2px;\">Six Venues · 2026–2028<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size: 11px; color:#9a917d; text-align:right;\">Prepared July 2026<\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-for list=\"{{ pageGroups }}\" as=\"group\" hint-placeholder-count=\"3\">\n      <div style=\"{{ group.pageStyle }}\">\n\n        <!-- Venue columns: photo + attributes, one grid so every row lines up under its photo -->\n        <div style=\"overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom: 20px;\">\n        <div style=\"{{ group.gridStyle }}\">\n\n          <!-- Photo row -->\n          <div><\u002Fdiv>\n          <sc-for list=\"{{ group.venues }}\" as=\"venue\" hint-placeholder-count=\"3\">\n            <div style=\"break-inside: avoid;\">\n              <image-slot id=\"{{ venue.photoId }}\" style=\"width:100%; aspect-ratio: 4/3; display:block;\" shape=\"rounded\" radius=\"6\" placeholder=\"{{ venue.placeholder }}\"><\u002Fimage-slot>\n              <div style=\"margin-top: 8px;\">\n                <div style=\"font-family:'Cormorant Garamond', serif; font-weight:600; font-size: 19px; color:#33422f;\">{{ venue.name }}<\u002Fdiv>\n                <div style=\"font-size: 11.5px; color:#7d735c;\">{{ venue.subtitle }}<\u002Fdiv>\n                <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n                  <sc-for list=\"{{ venue.links }}\" as=\"link\" hint-placeholder-count=\"1\">\n                    <a href=\"{{ link.url }}\" style=\"font-size: 11px; color:#a68b3f; text-decoration:none; border-bottom: 1px solid #a68b3f;\">{{ link.label }}<\u002Fa>\n                  <\u002Fsc-for>\n                  <sc-if value=\"{{ venue.note }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"font-size: 11px; color:#a0917f;\">{{ venue.note }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for ing-top: 4px;\">\n      <div style=\"font-family:'Cormorant Garamond', serif; font-size: clamp(22px, 4vw, 30px); font-weight: 600; color:#33422f; border-bottom: 1.5px solid #a68b3f; padding-bottom: 10px; margin-bottom: 18px;\">Pricing — Venue Only<\u002Fdiv>\n      <div style=\"overflow-x:auto; -webkit-overflow-scrolling:touch;\">\n      <sc-for list=\"{{ allVenues }}\" as=\"venue\" hint-placeholder-count=\"7\">\n              <\u002Fsc-for><sc-for list=\"{{ pricingRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n            <\u002Fsc-for><sc-for list=\"{{ row.values }}\" as=\"val\" hint-placeholder-count=\"7\">\n                <\u002Fsc-for><table style=\"width:100%; min-width:{{ pricingTableMinWidth }}; border-collapse: collapse; font-size: 12.5px;\">\n        <thead>\n          <tr style=\"background: #eef0e6;\">\n            <th style=\"text-align:left; padding: 7px 8px; font-weight:600; color:#33422f; border-bottom: 1.5px solid #a68b3f;\">&nbsp;<\u002Fth>\n            <th style=\"text-align:right; padding: 7px 8px; font-weight:600; color:#33422f; border-bottom: 1.5px solid #a68b3f;\">{{ venue.name }}<\u002Fth>\n            \n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n              <td style=\"padding: 7px 8px; color:#7d735c; border-bottom: 1px solid #e6dfcc;\">{{ row.label }}<\u002Ftd>\n              <td style=\"{{ val.style }}\">{{ val.text }}<\u002Ftd>\n              \n            <\u002Ftr>\n          \n        <\u002Ftbody>\n      <\u002Ftable>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: 14px; font-size: 10.5px; color:#9a917d; line-height: 1.5;\">{{ pricingFootnote }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Map page -->\n    <div style=\"break-before: page; padding-top: 4px;\">\n      <div style=\"border-bottom: 1.5px solid #a68b3f; padding-bottom: 10px; margin-bottom: 18px;\">\n        <div style=\"font-family:'Cormorant Garamond', serif; font-size: clamp(22px, 4vw, 30px); font-weight: 600; color:#33422f;\">Venue Locations<\u002Fdiv>\n        <div style=\"font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color:#8a7c5c; margin-top: 2px;\">Relative to Central London<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:relative; width:100%; border-radius: 10px; overflow:hidden; border: 1px solid #ddd4b8; background:#f2eee0;\">\n        <svg viewBox=\"0 0 900 620\" style=\"width:100%; height:auto; display:block;\">\n          <rect x=\"0\" y=\"0\" width=\"900\" height=\"620\" fill=\"#f2eee0\"><\u002Frect>\n\n          <!-- connecting lines -->\n          <line x1=\"613.3\" y1=\"346.4\" x2=\"663.9\" y2=\"425.4\" stroke=\"#a68b3f\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\" opacity=\"0.55\"><\u002Fline>\n          <line x1=\"613.3\" y1=\"346.4\" x2=\"127.8\" y2=\"520.8\" stroke=\"#a68b3f\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\" opacity=\"0.55\"><\u002Fline>\n          <line x1=\"613.3\" y1=\"346.4\" x2=\"268.8\" y2=\"308.8\" stroke=\"#a68b3f\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\" opacity=\"0.55\"><\u002Fline>\n          <line x1=\"613.3\" y1=\"346.4\" x2=\"144.1\" y2=\"81.8\" stroke=\"#a68b3f\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\" opacity=\"0.55\"><\u002Fline>\n          <line x1=\"613.3\" y1=\"346.4\" x2=\"834.8\" y2=\"235.0\" stroke=\"#a68b3f\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\" opacity=\"0.55\"><\u002Fline>\n          <line x1=\"613.3\" y1=\"346.4\" x2=\"484.9\" y2=\"402.2\" stroke=\"#a68b3f\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\" opacity=\"0.55\"><\u002Fline>\n\n          <!-- London -->\n          <circle cx=\"613.3\" cy=\"346.4\" r=\"9\" fill=\"#33422f\"><\u002Fcircle>\n          <circle cx=\"613.3\" cy=\"346.4\" r=\"3.5\" fill=\"#f2eee0\"><\u002Fcircle>\n\n          <!-- Addington Palace -->\n          <circle cx=\"663.9\" cy=\"425.4\" r=\"7\" fill=\"#a68b3f\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n\n          <!-- Froyle Park -->\n          <circle cx=\"127.8\" cy=\"520.8\" r=\"7\" fill=\"#a68b3f\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n\n          <!-- Hedsor House -->\n          <circle cx=\"268.8\" cy=\"308.8\" r=\"7\" fill=\"#a68b3f\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n\n          <!-- Stowe House -->\n          <circle cx=\"144.1\" cy=\"81.8\" r=\"7\" fill=\"#a68b3f\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n\n          <!-- Blake Hall -->\n          <circle cx=\"834.8\" cy=\"235.0\" r=\"7\" fill=\"#a68b3f\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n\n          <!-- Hampton Court House -->\n          <circle cx=\"484.9\" cy=\"402.2\" r=\"7\" fill=\"#a68b3f\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n        <\u002Fsvg>\n\n        <!-- London label -->\n        <div style=\"position:absolute; top:55.9%; right:calc(31.86% + 16px); transform:translateY(-50%); text-align:right; font-family:'Jost', sans-serif;\">\n          <div style=\"font-size:16px; font-weight:600; letter-spacing:1px; color:#33422f;\">LONDON<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Addington Palace label -->\n        <div style=\"position:absolute; top:68.6%; left:calc(73.77% + 16px); transform:translateY(-50%); font-family:'Jost', sans-serif;\">\n          <div style=\"font-size:15px; font-weight:600; color:#2c2a24;\">Addington Palace<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7d735c;\">Surrey<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#a68b3f;\">{{ distAddington }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Froyle Park label -->\n        <div style=\"position:absolute; top:84%; left:calc(14.2% + 16px); transform:translateY(-50%); font-family:'Jost', sans-serif;\">\n          <div style=\"font-size:15px; font-weight:600; color:#2c2a24;\">Froyle Park<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7d735c;\">Surrey<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#a68b3f;\">{{ distFroyle }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Hedsor House label -->\n        <div style=\"position:absolute; top:49.8%; left:calc(29.87% + 16px); transform:translateY(-50%); font-family:'Jost', sans-serif;\">\n          <div style=\"font-size:15px; font-weight:600; color:#2c2a24;\">Hedsor House<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7d735c;\">Berkshire<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#a68b3f;\">{{ distHedsor }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Stowe House label -->\n        <div style=\"position:absolute; top:13.19%; left:calc(16.01% + 16px); transform:translateY(-50%); font-family:'Jost', sans-serif;\">\n          <div style=\"font-size:15px; font-weight:600; color:#2c2a24;\">Stowe House<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7d735c;\">Buckinghamshire<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#a68b3f;\">{{ distStowe }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Blake Hall label -->\n        <div style=\"position:absolute; top:37.9%; right:calc(7.24% + 16px); transform:translateY(-50%); text-align:right; font-family:'Jost', sans-serif;\">\n          <div style=\"font-size:15px; font-weight:600; color:#2c2a24;\">Blake Hall<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7d735c;\">Essex<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#a68b3f;\">{{ distBlake }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Hampton Court House label -->\n        <div style=\"position:absolute; top:64.9%; left:calc(53.88% + 16px); transform:translateY(-50%); font-family:'Jost', sans-serif;\">\n          <div style=\"font-size:15px; font-weight:600; color:#2c2a24;\">Hampton Court House<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7d735c;\">Surrey<\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#a68b3f;\">{{ distHamptonCourt }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: 12px; font-size: 10.5px; color:#9a917d; line-height: 1.5;\">\n        Positions are approximate, shown for relative distance and direction from Central London only — not to precise scale. Distances are approximate driving distances.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n<\u002Fx-import>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;distanceUnit&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;drive time&quot;, &quot;options&quot;: [&quot;drive time&quot;, &quot;miles&quot;, &quot;km&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Map&quot; },\n  &quot;showDistances&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Map&quot; },\n  &quot;venuesPerPage&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 3, &quot;min&quot;: 1, &quot;max&quot;: 4, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Layout&quot; }\n}\">\nconst VENUES = [\n  {\n    id: 'addington', name: 'Addington Palace', photoId: 'photo-addington',\n    subtitle: '18th Century Mansion · Surrey', capacity: 200,\n    includes: 'Venue hire only. No corkage fee — bring your own soft & alcoholic beverages. 14-hour rental. Event team included.',\n    extras: '19 bedrooms, sleeping 48 on site.',\n    toKnow: '2027 prices', excludesVAT: false,\n    links: [{ label: 'View brochure ↗', url: 'https://share.google/lTGd9D2jWZ9h4S4Y8' }],\n    prices: { thuNov: '£6,900', friNov: '£8,500', satNov: '£10,900', thuDec: '£7,900', friDec: '£10,500', satDec: '£13,500' },\n  },\n  {\n    id: 'froyle', name: 'Froyle Park', photoId: 'photo-froyle',\n    subtitle: 'Stately Home · Surrey', capacity: 200,\n    includes: 'Venue hire only. No corkage fee until 7pm — bring your own soft & alcoholic beverages. Can accommodate up to 64 guests overnight, potentially saving £3,850 vs. the £120/night rate.',\n    extras: '32 bedrooms plus a dry-hire venue.',\n    toKnow: '2028 prices', excludesVAT: false,\n    links: [{ label: 'View brochure ↗', url: 'https://drive.google.com/file/d/1J-bpjfsd0hktefLC1uCpnklJy62ZwvXT/view?usp=sharing' }],\n    prices: { thuNov: '£10,000', friNov: '£11,500', satNov: '£14,250', thuDec: '£10,000', friDec: '£11,500', satDec: '£14,250' },\n  },\n  {\n    id: 'hedsor', name: 'Hedsor House', photoId: 'photo-hedsor',\n    subtitle: 'Stately Home · Berkshire', capacity: 150,\n    includes: 'Dry hire, including accommodation for 26. Corkage fee £1,900 (excl. Champagne, Prosecco & wine). Includes Duty Manager, tables & chairs.',\n    extras: '12 bedrooms; can hold a legal ceremony.',\n    toKnow: '2028 prices, exclude VAT', excludesVAT: true,\n    links: [\n      { label: 'Brochure ↗', url: 'https://drive.google.com/file/d/1xI4nD1XDey8knrwEW1lHCsSybQLP4yBx/view?usp=drive_link' },\n      { label: 'Pricing ↗', url: 'https://hedsorhouse.s3.eu-west-2.amazonaws.com/wp-content/uploads/2026/04/21100105/Hedsor-Dry-Hire-Pricing-2028_NL.pdf' },\n    ],\n    prices: { thuNov: '£7,950', friNov: '£9,950', satNov: '£12,950', thuDec: '£10,950', friDec: '£13,950', satDec: '£18,450' },\n  },\n  {\n    id: 'stowe', name: 'Stowe House', photoId: 'photo-stowe',\n    subtitle: 'Stately Home · Buckinghamshire', capacity: 150,\n    includes: 'Dry hire. £500 corkage fee to extend post wedding-breakfast, waived if the in-house caterer runs the bar.',\n    extras: 'Civil ceremony licensed. Preferred supplier list (Asian caterers TBC). National Trust gardens.',\n    toKnow: 'Excludes VAT', excludesVAT: true,\n    links: [{ label: 'View brochure ↗', url: 'https://drive.google.com/file/d/1gJ_3Dh_9qllNUS_lwueRcmX-yk6MOfv3/view?usp=drive_link' }],\n    prices: { thuNov: '£8,460', friNov: '£9,510', satNov: '£10,560', thuDec: '£8,460', friDec: '£9,510', satDec: '£10,560' },\n  },\n  {\n    id: 'blake', name: 'Blake Hall', photoId: 'photo-blake',\n    subtitle: 'Barn · Essex', capacity: 150,\n    includes: 'Dry venue hire — for catering only, not the bar. Tables, linen, event team and a washing-up person included.',\n    extras: 'Some on-site accommodation.',\n    toKnow: '2027 prices', excludesVAT: false,\n    links: [\n      { label: 'Brochure ↗', url: 'https://drive.google.com/file/d/1nBuQrozCphSkwkPay4hflZt1nHShBTAs/view?usp=drive_link' },\n      { label: 'Dry hire info ↗', url: 'https://www.blakehall.co.uk/wp-content/uploads/2026/03/Dry-Hire-What-is-included.-2026a.pdf' },\n    ],\n    prices: { thuNov: '£8,625', friNov: '£9,175', satNov: 'TBC', thuDec: '£8,625', friDec: '£9,175', satDec: 'TBC' },\n  },\n  {\n    id: 'hamptoncourt', name: 'Hampton Court House', photoId: 'photo-hamptoncourt',\n    subtitle: 'Stately Home · Surrey', capacity: 150,\n    includes: 'Dry hire venue with 3 rooms to use. No corkage fee for bringing your own alcohol, though your caterer may charge one for serving it.',\n    extras: '',\n    toKnow: '2028 prices (unconfirmed)', excludesVAT: false,\n    links: [{ label: 'Brochure ↗', url: 'assets/Hampton-Court-House-Gallery.pdf' }], note: 'Prices link pending',\n    prices: { thuNov: '£7,300', friNov: '£8,800', satNov: '£9,300', thuDec: '£8,800', friDec: '£10,800', satDec: '£11,300' },\n  },\n];\n\nconst DAYS = [\n  { label: 'Thursday · November', key: 'thuNov', bold: false },\n  { label: 'Friday · November', key: 'friNov', bold: false },\n  { label: 'Saturday · November', key: 'satNov', bold: true },\n  { label: 'Thursday · December', key: 'thuDec', bold: false },\n  { label: 'Friday · December', key: 'friDec', bold: false },\n  { label: 'Saturday · December', key: 'satDec', bold: true },\n];\n\nfunction chunk(arr, size) {\n  const out = [];\n  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));\n  return out;\n}\n\nclass Component extends DCLogic {\n  state = { isMobile: typeof window !== 'undefined' && window.innerWidth <= 720 };\n\n  componentDidMount() {\n    this._onResize = () => {\n      const isMobile = window.innerWidth <= 720;\n      if (isMobile !== this.state.isMobile) this.setState({ isMobile });\n    };\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  renderVals() {\n    const unit = this.props.distanceUnit ?? 'drive time';\n    const showDistances = this.props.showDistances ?? true;\n    const perPage = this.props.venuesPerPage ?? 4;\n\n    const groups = chunk(VENUES, perPage).map((venuesChunk, gi) => {\n      const venues = venuesChunk.map((v) => ({\n        ...v,\n        placeholder: 'Drop ' + v.name + ' photo',\n      }));\n\n      return {\n        venues,\n        gridStyle: 'display:grid; grid-template-columns: 128px repeat(' + venues.length + ', minmax(150px, 1fr)); column-gap:14px; min-width:' + (128 + venues.length * 164) + 'px;',\n        pageStyle: gi === 0 ? '' : 'break-before: page; padding-top: 4px;',\n      };\n    });\n\n    // single pricing comparison across all venues, on its own page\n    const allVenues = VENUES.map((v) => ({ ...v }));\n    const pricingRows = DAYS.map((day) => ({\n      label: day.label,\n      values: allVenues.map((v) => ({\n        text: v.prices[day.key],\n        style: 'padding: 7px 8px; text-align:right; border-bottom: 1px solid #e6dfcc; font-variant-numeric: tabular-nums;' +\n          (day.bold ? ' font-weight:600;' : '') +\n          (v.prices[day.key] === 'TBC' ? ' color:#a0917f;' : ''),\n      })),\n    }));\n    const vatNames = allVenues.filter((v) => v.excludesVAT).map((v) => v.name);\n    const pricingFootnote = 'Prices shown are venue hire only.' + (vatNames.length ? ' ' + vatNames.join(', ') + (vatNames.length > 1 ? ' prices exclude' : ' price excludes') + ' VAT.' : '');\n    const pricingGridWidth = 128 + allVenues.length * 130;\n\n    // approx road miles + rough drive time (mins) from Central London\n    const data = {\n      addington: { mi: 10, min: 35 },\n      froyle: { mi: 50, min: 80 },\n      hedsor: { mi: 30, min: 55 },\n      stowe: { mi: 65, min: 95 },\n      blake: { mi: 25, min: 55 },\n      hamptonCourt: { mi: 13, min: 40 },\n    };\n    const fmtTime = (min) => {\n      const h = Math.floor(min / 60), m = min % 60;\n      return h > 0 ? ('~' + h + ' hr' + (m ? ' ' + m + ' min' : '') + ' drive') : ('~' + m + ' min drive');\n    };\n    const fmt = (d) => {\n      if (!showDistances) return '';\n      if (unit === 'km') return '~' + Math.round(d.mi * 1.60934) + ' km from London';\n      if (unit === 'miles') return '~' + d.mi + ' mi from London';\n      return fmtTime(d.min) + ' from London';\n    };\n\n    return {\n      pageWidth: this.state.isMobile ? '100%' : '297mm',\n      pageMargin: this.state.isMobile ? '16px' : '12mm',\n      pageGroups: groups,\n      allVenues,\n      pricingRows,\n      pricingFootnote,\n      pricingTableMinWidth: pricingGridWidth + 'px',\n      distAddington: fmt(data.addington),\n      distFroyle: fmt(data.froyle),\n      distHedsor: fmt(data.hedsor),\n      distStowe: fmt(data.stowe),\n      distBlake: fmt(data.blake),\n      distHamptonCourt: fmt(data.hamptonCourt),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
