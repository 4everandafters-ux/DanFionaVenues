  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

lex-wrap:wrap;\">\n          <image-slot id=\"{{ venue.photoId }}\" style=\"width:150px; height:120px; flex-shrink:0;\" shape=\"rounded\" radius=\"16\" placeholder=\"{{ venue.placeholder }}\"><\u002Fimage-slot>\n\n          <div style=\"flex:1; min-width:180px;\">\n            <div style=\"font-family:'Fredoka', sans-serif; font-size: 21px; font-weight:600; color:#3a2f28;\">{{ venue.name }}<\u002Fdiv>\n            <div style=\"font-size: 13px; color:#a0917f; margin-bottom: 10px;\">{{ venue.subtitle }}<\u002Fdiv>\n\n            <div style=\"display:flex; gap:4px; margin-bottom: 10px;\">\n              <sc-for list=\"{{ venue.stars }}\" as=\"star\" hint-placeholder-count=\"5\">\n                <button onclick=\"{{ star.onClick }}\" style=\"background:none; border:none; cursor:pointer; font-size:26px; line-height:1; padding:2px; color:{{ star.color }};\">{{ star.glyph }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n              <sc-for list=\"{{ venue.thumbs }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <textarea value=\"{{ venue.comment }}\" onchange=\"{{ venue.onComment }}\" placeholder=\"Any thoughts? (the garden, the price, the vibe...)\" style=\"width:100%; box-sizing:border-box; margin-top: 14px; border: 1.5px solid #eee2d3; border-radius: 12px; padding: 10px 12px; font-family:'Nunito', sans-serif; font-size: 14px; color:#3a2f28; resize: vertical; min-height: 44px;\"><\u002Ftextarea>\n\n        <button onclick=\"{{ venue.onToggleTop }}\" style=\"{{ venue.topButtonStyle }}\">{{ venue.topButtonLabel }}<\u002Fbutton>\n        <button onclick=\"{{ venue.onToggleVisit }}\" style=\"{{ venue.visitButtonStyle }}\">{{ venue.visitButtonLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n\n    <div style=\"background:#fff; border-radius: 22px; padding: 22px; margin-top: 8px; box-shadow: 0 6px 20px rgba(60,40,20,0.08);\">\n      <div style=\"font-family:'Fredoka', sans-serif; font-size: 19px; font-weight:600; color:#3a2f28; margin-bottom: 8px;\">Anything else on your mind?<\u002Fdiv>\n      <textarea value=\"{{ finalNote }}\" onchange=\"{{ onFinalNote }}\" placeholder=\"Any dates you are available for visits, how do you want us to tailor your venue search forward etc\" style=\"width:100%; box-sizing:border-box; border: 1.5px solid #eee2d3; border-radius: 12px; padding: 10px 12px; font-family:'Nunito', sans-serif; font-size: 14px; color:#3a2f28; resize: vertical; min-height: 60px;\"><\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div style=\"text-align:center; margin-top: 26px;\">\n      <button onclick=\"{{ copySummary }}\" style=\"background:{{ accentColor }}; color:#fff; border:none; border-radius: 999px; padding: 14px 30px; font-family:'Fredoka', sans-serif; font-size: 17px; font-weight:600; cursor:pointer; box-shadow: 0 6px 16px rgba(0,0,0,0.12);\">{{ copyButtonLabel }}<\u002Fbutton>\n      <div style=\"font-size: 12.5px; color:#a0917f; margin-top: 10px;\">Copies a summary of your ratings so you can paste it back to me<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#e8623f&quot;,&quot;options&quot;:[&quot;#e8623f&quot;,&quot;#4fa88a&quot;,&quot;#d9a441&quot;,&quot;#c76b9a&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;maxTopPicks&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;min&quot;:1,&quot;max&quot;:3,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nconst VENUES = [\n  { id: 'addington', name: 'Addington Palace', subtitle: '18th Century Mansion · Surrey', photoId: 'photo-addington' },\n  { id: 'froyle', name: 'Froyle Park', subtitle: 'Stately Home · Surrey', photoId: 'photo-froyle' },\n  { id: 'hedsor', name: 'Hedsor House', subtitle: 'Stately Home · Berkshire', photoId: 'photo-hedsor' },\n  { id: 'stowe', name: 'Stowe House', subtitle: 'Stately Home · Buckinghamshire', photoId: 'photo-stowe' },\n  { id: 'blake', name: 'Blake Hall', subtitle: 'Barn · Essex', photoId: 'photo-blake' },\n  { id: 'hamptoncourt', name: 'Hampton Court House', subtitle: 'Stately Home · Surrey', photoId: 'photo-hamptoncourt' },\n];\n\nconst THUMB_OPTIONS = [\n  { key: 'love', label: 'Love it' },\n  { key: 'maybe', label: 'Maybe' },\n  { key: 'no', label: 'Not for us' },\n];\n\nconst STORAGE_KEY = 'venue-feedback-state-v1';\n\nclass Component extends DCLogic {\n  state = this._load();\n\n  _load() {\n    try {\n      const raw = localStorage.getItem(STORAGE_KEY);\n      if (raw) return JSON.parse(raw);\n    } catch (e) {}\n    return { ratings: {}, thumbs: {}, comments: {}, topPicks: [], finalNote: '', copied: false, visitRequests: {} };\n  }\n\n  _persist(next) {\n    try {\n      const { ratings, thumbs, comments, topPicks, finalNote, visitRequests } = next;\n      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ratings, thumbs, comments, topPicks, finalNote, visitRequests }));\n    } catch (e) {}\n  }\n\n  _update(patch) {\n    this.setState((s) => {\n      const next = { ...s, ...patch };\n      this._persist(next);\n      return next;\n    });\n  }\n\n  setRating(id, n) {\n    this._update({ ratings: { ...this.state.ratings, [id]: n } });\n  }\n\n  setThumb(id, key) {\n    this._update({ thumbs: { ...this.state.thumbs, [id]: key } });\n  }\n\n  setComment(id, text) {\n    this._update({ comments: { ...this.state.comments, [id]: text } });\n  }\n\n  setFinalNote(text) {\n    this._update({ finalNote: text });\n  }\n\n  toggleVisitRequest(id) {\n    const current = this.state.visitRequests || {};\n    this._update({ visitRequests: { ...current, [id]: !current[id] } });\n  }\n\n  toggleTopPick(id) {\n    const max = this.props.maxTopPicks ?? 2;\n    const current = this.state.topPicks || [];\n    let next;\n    if (current.includes(id)) {\n      next = current.filter((x) => x !== id);\n    } else if (current.length < max) {\n      next = [...current, id];\n    } else {\n      next = current; // at cap, ignore\n    }\n    this._update({ topPicks: next });\n  }\n\n  copySummary() {\n    const accent = this.props.accentColor ?? '#e8623f';\n    const lines = ['Venue feedback', ''];\n    VENUES.forEach((v) => {\n      const rating = this.state.ratings[v.id] || 0;\n      const thumb = THUMB_OPTIONS.find((t) => t.key === this.state.thumbs[v.id]);\n      const comment = (this.state.comments[v.id] || '').trim();\n      const wantsVisit = !!(this.state.visitRequests || {})[v.id];\n      lines.push(v.name + ' — ' + (rating ? rating + '/5' : 'not rated') + (thumb ? ', ' + thumb.label : '') + (wantsVisit ? ' — wants to visit' : ''));\n      if (comment) lines.push('  \"' + comment + '\"');\n      lines.push('');\n    });\n    const topNames = (this.state.topPicks || []).map((id) => VENUES.find((v) => v.id === id).name);\n    lines.push('Our top picks: ' + (topNames.length ? topNames.join(', ') : 'none yet'));\n    if ((this.state.finalNote || '').trim()) {\n      lines.push('');\n      lines.push('Other notes: ' + this.state.finalNote.trim());\n    }\n    const text = lines.join('\\n');\n    const done = () => {\n      this.setState({ copied: true });\n      setTimeout(() => this.setState({ copied: false }), 2000);\n    };\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(text).then(done).catch(done);\n    } else {\n      done();\n    }\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#e8623f';\n    const sage = '#4fa88a';\n    const max = this.props.maxTopPicks ?? 2;\n\n    const venues = VENUES.map((v) => {\n      const rating = this.state.ratings[v.id] || 0;\n      const thumbSel = this.state.thumbs[v.id];\n      const comment = this.state.comments[v.id] || '';\n      const isTop = (this.state.topPicks || []).includes(v.id);\n      const capped = (this.state.topPicks || []).length >= max && !isTop;\n      const wantsVisit = !!(this.state.visitRequests || {})[v.id];\n\n      const stars = [1, 2, 3, 4, 5].map((n) => ({\n        glyph: n <= rating ? '★' : '☆',\n        color: n <= rating ? accent : '#e2d6c6',\n        onClick: () => this.setRating(v.id, n),\n      }));\n\n      const thumbs = THUMB_OPTIONS.map((opt) => {\n        const selected = thumbSel === opt.key;\n        return {\n          label: opt.label,\n          onClick: () => this.setThumb(v.id, opt.key),\n          style: 'border-radius:999px; padding:7px 14px; font-family:Nunito,sans-serif; font-size:13px; font-weight:700; cursor:pointer; border:1.5px solid ' +\n            (selected ? accent : '#eee2d3') + '; background:' + (selected ? accent : '#fff') + '; color:' + (selected ? '#fff' : '#3a2f28') + ';',\n        };\n      });\n\n      return {\n        id: v.id,\n        name: v.name,\n        subtitle: v.subtitle,\n        photoId: v.photoId,\n        placeholder: 'Drop ' + v.name + ' photo',\n        comment,\n        onComment: (e) => this.setComment(v.id, e.target.value),\n        stars,\n        thumbs,\n        cardBorder: isTop ? '2px solid ' + sage : '2px solid transparent',\n        onToggleTop: () => this.toggleTopPick(v.id),\n        topButtonLabel: isTop ? '✓ In your top ' + max : (capped ? 'Top ' + max + ' picked' : 'Add to top ' + max),\n        topButtonStyle: 'margin-top:12px; margin-right:8px; border-radius:999px; padding:8px 16px; font-family:Nunito,sans-serif; font-size:13px; font-weight:800; cursor:' + (capped ? 'default' : 'pointer') + '; border:1.5px solid ' + sage + '; background:' + (isTop ? sage : '#fff') + '; color:' + (isTop ? '#fff' : sage) + '; opacity:' + (capped ? '0.55' : '1') + ';',\n        onToggleVisit: () => this.toggleVisitRequest(v.id),\n        visitButtonLabel: wantsVisit ? '✓ Visit requested' : 'Request to visit',\n        visitButtonStyle: 'margin-top:12px; border-radius:999px; padding:8px 16px; font-family:Nunito,sans-serif; font-size:13px; font-weight:800; cursor:pointer; border:1.5px solid ' + accent + '; background:' + (wantsVisit ? accent : '#fff') + '; color:' + (wantsVisit ? '#fff' : accent) + ';',\n      };\n    });\n\n    return {\n      bgColor: '#fdf6ec',\n      accentColor: accent,\n      venues,\n      finalNote: this.state.finalNote || '',\n      onFinalNote: (e) => this.setFinalNote(e.target.value),\n      copySummary: () => this.copySummary(),\n      copyButtonLabel: this.state.copied ? 'Copied! ✓' : 'Copy summary for planner',\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
